name: FarmConnect
options:
  minimumXcodeGenVersion: 2.38.0
targets:
  FarmConnect:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - FarmConnect
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.persephonesbasket.farmconnect
        PRODUCT_NAME: FarmConnect
        SWIFT_VERSION: 5.9
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: FarmConnect/FarmConnect.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: FarmConnect
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: We use location to show local farm posts on the map.
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: We use photos to upload images in posts.
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: We may save generated media to your photo library.
        INFOPLIST_KEY_UIBackgroundModes:
          - remote-notification
